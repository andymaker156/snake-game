acceptanceCriteria:
  - id: "AC-001"
    title: "Power-up System Functional"
    given: "Player has consumed a power-up item"
    when: "Game tick executes during active power-up duration"
    then: "Effect is applied (speed boost modifies tick rate) and persists until expiration"
    validation: "Game loop frequency increases by 30% and returns to normal after duration"

  - id: "AC-002"
    title: "Obstacles Block Movement"
    given: "Obstacle is placed on grid at coordinates (x, y)"
    when: "Snake head moves to (x, y)"
    then: "Game over state triggered (same as wall collision)"
    validation: "Snake cannot occupy obstacle cell; game-over triggered"

  - id: "AC-003"
    title: "Special Food Types Award Correct Points"
    given: "Food spawned with type: normal|bonus|super"
    when: "Snake consumes food"
    then: "Score increases by correct amount (1, 5, or 15 points respectively)"
    validation: "Score display matches expected values after eating each food type"

  - id: "AC-004"
    title: "Difficulty Preset Applies All Settings"
    given: "User selects 'Hard' difficulty"
    when: "Game initializes"
    then: "Speed=100ms, GridSize=20, Obstacles=8-12, PowerUpRate=5%"
    validation: "Game board, game speed, and obstacle count match preset"

  - id: "AC-005"
    title: "D-Pad Controls Functional on Mobile"
    given: "User on mobile device taps D-Pad arrow button"
    when: "Touch event fires on button element"
    then: "Snake direction changes (same as keyboard arrow key)"
    validation: "Snake moves in tapped direction; works across all directions"

  - id: "AC-006"
    title: "Leaderboard Persists and Displays"
    given: "Player completes game with score > 500"
    when: "Game over and player enters name"
    then: "Entry saved to localStorage and appears in leaderboard top 50"
    validation: "Leaderboard displays player name, score, date in correct rank order"

  - id: "AC-007"
    title: "No Breaking Changes to Core Game"
    given: "Existing game running on v1.0"
    when: "New feature code executes"
    then: "Classic game mode (no difficulty preset) still functional"
    validation: "Original 3 speed presets and 3 grid sizes still available and work"

  - id: "AC-008"
    title: "Performance Maintained"
    given: "Game with obstacles, power-ups, and active effects"
    when: "Game loop executes"
    then: "Frame rate ≥ 30fps even on 12×12 with 15+ obstacles"
    validation: "No visual lag; render completes in <33ms per frame"

  - id: "AC-009"
    title: "localStorage Backward Compatibility"
    given: "User has existing score history from v1.0"
    when: "New version loads"
    then: "Old score history loads without corruption; new fields initialize with defaults"
    validation: "Score history persists; new entries include difficulty metadata"

  - id: "AC-010"
    title: "Code Reuse >= 70%"
    given: "All features implemented"
    when: "Code review calculates pattern reuse"
    then: "At least 70% of functionality extends existing patterns vs. new code"
    validation: "Reuse assessment: existing placeFood extended, step collision logic extended, etc."

