<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="/snake.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="game-title">
      <div class="header">
        <div>
          <h1 id="game-title">Snake</h1>
          <p class="subtitle">Classic grid movement, food, score, restart.</p>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="scoreboard score-secondary" aria-live="polite">
          <span>Best</span>
          <strong id="best-score">0</strong>
        </div>
      </div>

      <div class="status-row">
        <p id="status">Press any arrow key or WASD to start.</p>
        <div class="actions">
          <label class="field" for="speed-select">
            <span>Speed</span>
            <select id="speed-select">
              <option value="180">Chill</option>
              <option value="140" selected>Classic</option>
              <option value="100">Fast</option>
              <option value="70">Insane</option>
            </select>
          </label>
          <label class="toggle" for="wrap-toggle">
            <input id="wrap-toggle" type="checkbox">
            <span>Wrap walls</span>
          </label>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>
      </div>

      <div
        id="board"
        class="board"
        role="grid"
        aria-label="Snake game board"
      ></div>

      <section class="controls" aria-label="Touch controls">
        <button type="button" data-direction="up" aria-label="Move up">Up</button>
        <div class="controls-row">
          <button type="button" data-direction="left" aria-label="Move left">Left</button>
          <button type="button" data-direction="down" aria-label="Move down">Down</button>
          <button type="button" data-direction="right" aria-label="Move right">Right</button>
        </div>
      </section>

      <p class="help">Controls: Arrow keys or WASD. Space pauses. Restart resets the game. Change speed anytime. Wrap mode lets the snake loop through walls.</p>
    </section>
  </main>

  <script src="/snake-logic.js"></script>
  <script src="/snake-game.js"></script>
</body>
</html>
