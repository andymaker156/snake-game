<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Concept - Mobile First</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f7f5ef;
      --panel: #ffffff;
      --ink: #242826;
      --muted: #66706a;
      --line: #d9ddd4;
      --green: #267a45;
      --green-2: #dcf4e4;
      --red: #d9455f;
      --yellow: #d89a00;
      --blue: #2379b8;
    }
    body {
      margin: 0;
      min-width: 320px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      padding: 12px;
    }
    header, .board-card, .controls, .sheet {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(36,40,38,0.07);
    }
    header { padding: 14px; display: grid; gap: 10px; }
    .title { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    h1, p { margin: 0; }
    h1 { font-size: 1.5rem; color: var(--green); letter-spacing: 0; }
    .status { color: var(--muted); line-height: 1.35; }
    .score-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .score {
      padding: 9px;
      border-radius: 9px;
      background: var(--green-2);
      text-align: center;
    }
    .score span { display: block; font-size: 0.74rem; color: var(--muted); text-transform: uppercase; }
    .score strong { display: block; margin-top: 2px; font-size: 1.35rem; }
    .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .chip {
      min-height: 40px;
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 13px;
      background: #fff;
      font: inherit;
      font-weight: 700;
      color: var(--ink);
    }
    .chip.active { background: var(--green); color: #fff; border-color: var(--green); }
    .board-card { padding: 10px; }
    .board {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
      padding: 8px;
      border-radius: 10px;
      background: #eef2ec;
    }
    .cell { border-radius: 4px; background: rgba(38,122,69,0.08); }
    .snake { background: var(--green); }
    .head { background: #7bcf56; }
    .food { background: var(--red); border-radius: 999px; }
    .bonus { background: var(--yellow); border-radius: 999px; }
    .power { background: var(--blue); border-radius: 999px; }
    .controls {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 6px;
    }
    .dpad button, .icon-btn {
      min-width: 48px;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--green-2);
      color: var(--green);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 900;
    }
    .dpad button:focus-visible, .icon-btn:focus-visible, .chip:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }
    .sheet { padding: 12px; display: grid; gap: 10px; }
    h2 { margin: 0; font-size: 0.94rem; text-transform: uppercase; color: var(--muted); }
    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border-radius: 9px;
      background: #f4f6f1;
    }
    .meta { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
    @media (min-width: 860px) {
      .app {
        width: min(100%, 1040px);
        grid-template-columns: minmax(300px, 1fr) minmax(420px, 620px);
        grid-template-rows: auto 1fr auto;
      }
      header, .chips, .sheet { grid-column: 1; }
      .board-card { grid-column: 2; grid-row: 1 / 3; align-self: start; }
      .controls { grid-column: 2; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="title">
        <div>
          <h1>Snake</h1>
          <p class="status">Easy mode. Swipe, tap, or use the D-pad.</p>
        </div>
        <button class="icon-btn" aria-label="Pause">Ⅱ</button>
      </div>
      <div class="score-strip" aria-label="Scores">
        <div class="score"><span>Score</span><strong>18</strong></div>
        <div class="score"><span>Best</span><strong>64</strong></div>
        <div class="score"><span>Combo</span><strong>x2</strong></div>
      </div>
    </header>
    <nav class="chips" aria-label="Difficulty">
      <button class="chip active">Easy</button>
      <button class="chip">Classic</button>
      <button class="chip">Hard</button>
      <button class="chip">Insane</button>
      <button class="chip">Wrap</button>
    </nav>
    <section class="board-card" aria-label="Game board">
      <div class="board">
        <script>
          const cells = new Map([[52,'head'],[53,'snake'],[54,'snake'],[66,'snake'],[78,'snake'],[90,'snake'],[102,'snake'],[33,'food'],[116,'bonus'],[19,'power']]);
          for (let i = 0; i < 144; i += 1) {
            const div = document.createElement('div');
            div.className = `cell ${cells.get(i) || ''}`;
            document.currentScript.parentElement.appendChild(div);
          }
        </script>
      </div>
    </section>
    <section class="controls" aria-label="Touch controls">
      <button class="icon-btn" aria-label="Restart">↻</button>
      <div class="dpad">
        <button class="up" aria-label="Move up">↑</button>
        <button class="left" aria-label="Move left">←</button>
        <button class="right" aria-label="Move right">→</button>
        <button class="down" aria-label="Move down">↓</button>
      </div>
      <button class="icon-btn" aria-label="Sound">♪</button>
    </section>
    <section class="sheet" aria-label="Recent results">
      <h2>Recent Games</h2>
      <div class="item"><span>Easy run<div class="meta">12x12 - today</div></span><strong>18</strong></div>
      <div class="item"><span>Classic run<div class="meta">16x16 - yesterday</div></span><strong>64</strong></div>
    </section>
  </main>
</body>
</html>
